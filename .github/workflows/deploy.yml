name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Установить зависимости
        run: |
          echo "Проверяем наличие package-lock.json..."
          if [ -f package-lock.json ]; then
            echo "package-lock.json найден, использую npm ci"
            npm ci
          else
            echo "package-lock.json не найден, использую npm install"
            npm install
          fi

      - name: Запустить тесты
        run: |
          echo "Запускаем тесты..."
          # Если тесты не настроены, просто выводим сообщение и успешно завершаем
          if npm run | grep -q "test"; then
            npm test
          else
            echo "Тесты не настроены, пропускаем этап"
          fi

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Симуляция деплоя (для учебных целей)
        run: |
          echo "=== ДЕПЛОЙ ЗАПУЩЕН ==="
          echo "Приложение готово к развертыванию!"
          echo "В реальном проекте здесь было бы подключение к серверу"
          echo "=== ДЕПЛОЙ ЗАВЕРШЕН УСПЕШНО ==="
