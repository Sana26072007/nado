name: CI/CD Pipeline

on:
  push:
    branches: [ main ]  # Запускается при пуше в main
  pull_request:
    branches: [ main ]  # Запускается при создании PR (только сборка и тесты)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код из репозитория
        uses: actions/checkout@v3

      - name: Установить Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Установить зависимости (npm ci быстрее и надежнее для CI)
        run: npm ci

      - name: Запустить линтер (проверка стиля кода)
        run: npm run lint

      - name: Запустить тесты
        run: npm test

      - name: Собрать приложение (если требуется, например React build)
        run: npm run build

      # Этап деплоя (запустится только при пуше в main, а не при PR)
  deploy:
    needs: build-and-test  # Ждем, пока пройдут тесты
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Деплой на сервер через SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}   # IP сервера (хранится в Secrets)
          username: ${{ secrets.SERVER_USER }} # Логин (хранится в Secrets)
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Приватный ключ (хранится в Secrets)
          port: 22
          script: |
            cd /var/www/my-app
            git pull origin main
            npm ci
            pm2 restart my-app  # Перезапуск приложения (если используется PM2)
