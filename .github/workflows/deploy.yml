name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Проверка наличия файлов
        run: |
          echo "Проверяем файлы в репозитории:"
          ls -la
          echo "Все файлы на месте, пропускаем тесты для статического сайта"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Симуляция деплоя статического сайта
        run: |
          echo "=== НАЧАЛО ДЕПЛОЯ ==="
          echo "Деплоим статический сайт:"
          echo "Найдены файлы:"
          ls -la
          echo "В реальном проекте здесь файлы скопировались бы на хостинг"
          echo "=== ДЕПЛОЙ ЗАВЕРШЕН УСПЕШНО ==="
